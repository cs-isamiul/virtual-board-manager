<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Screen - Custom D&D Map</title>
    <style id="main-styles">
        :root {
            --grid-size: 50px;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #1e1e2e;
            color: #cdd6f4;
        }

        /* Sidebar Controls */
        #controls {
            width: 320px;
            padding: 20px;
            background-color: #313244;
            border-right: 2px solid #11111b;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 20000;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
            border-bottom: 1px solid #45475a;
        }

        .control-group h3 {
            margin: 0 0 5px 0;
            font-size: 1.1em;
            color: #89b4fa;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .row input[type="number"] {
            width: 60px;
        }

        label {
            font-weight: bold;
            font-size: 0.9em;
        }

        input, select, button {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #585b70;
            background-color: #181825;
            color: #cdd6f4;
            font-family: inherit;
        }

        button {
            background-color: #89b4fa;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #b4befe;
        }
        
        .btn-project {
            background-color: #a6e3a1;
        }
        .btn-project:hover {
            background-color: #94e2d5;
        }

        .instructions {
            background: #181825;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85em;
            line-height: 1.5;
            border: 1px dashed #585b70;
        }
        
        .instructions ul {
            margin: 0;
            padding-left: 20px;
        }

        /* Map Area */
        #workspace {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        #workspace:active {
            cursor: grabbing;
        }

        #map-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
        }

        #map-image {
            display: block;
            user-select: none;
        }

        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-size: var(--grid-size) var(--grid-size);
            background-position: 0px 0px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            display: none;
        }

        #token-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Elements (Tokens & Fog) */
        .board-element {
            position: absolute;
            cursor: grab;
            user-select: none;
            pointer-events: auto;
            box-sizing: border-box;
        }

        .board-element:active {
            cursor: grabbing;
        }

        /* Tokens */
        .token {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid #11111b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            color: white;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
        }

        .token-initial {
            font-weight: bold;
            font-size: 1.5em;
            line-height: 1;
        }

        .token-hp {
            font-size: 0.8em;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 2px;
            text-shadow: none;
            box-sizing: border-box;
        }

        /* DM Only Token Styles (Parent Window) */
        .token.dm-only {
            border: 3px dashed #f38ba8;
            opacity: 0.6;
        }

        .token-hp.hp-dm-only {
            border: 1px dashed #f38ba8;
            background: rgba(243, 139, 168, 0.3);
        }

        /* Fog of War */
        .fog-of-war {
            background-color: #000000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <h3>Display</h3>
            <button id="btn-open-player" class="btn-project">Open Player Projection</button>
            <span id="player-status" style="font-size: 0.8em; color: #f38ba8;">Not Connected</span>
        </div>

        <div class="control-group">
            <label for="map-upload">Load Map Image</label>
            <input type="file" id="map-upload" accept="image/*">
        </div>

        <div class="control-group">
            <label for="grid-toggle">
                <input type="checkbox" id="grid-toggle"> Show Grid
            </label>
            <label for="grid-size">Grid Size (px)</label>
            <input type="number" id="grid-size" value="50" min="10" max="200">
            
            <label>Grid Offset (X / Y px)</label>
            <div class="row">
                <input type="number" id="grid-offset-x" value="0">
                <input type="number" id="grid-offset-y" value="0">
            </div>
        </div>

        <div class="control-group">
            <h3>Create Token</h3>
            <label for="token-initial">Initial / Name</label>
            <input type="text" id="token-initial" value="M" maxlength="3">

            <label for="token-hp">HP</label>
            <input type="number" id="token-hp" value="50">

            <label for="token-size">Size (Squares)</label>
            <select id="token-size">
                <option value="1">1x1 (Medium/Small)</option>
                <option value="2">2x2 (Large)</option>
                <option value="3">3x3 (Huge)</option>
                <option value="4">4x4 (Gargantuan)</option>
            </select>

            <label for="token-color">Color</label>
            <input type="color" id="token-color" value="#89b4fa">

            <label for="token-dm-only" style="color: #f38ba8;">
                <input type="checkbox" id="token-dm-only"> DM Only (Hide Token from Players)
            </label>

            <label for="token-hp-dm-only" style="color: #f38ba8;">
                <input type="checkbox" id="token-hp-dm-only"> HP DM Only (Hide HP from Players)
            </label>

            <button id="btn-generate-token">Generate Token</button>
        </div>

        <div class="control-group">
            <h3>Fog of War</h3>
            <label>Size (Width / Height in Squares)</label>
            <div class="row">
                <input type="number" id="fog-width" value="3" min="1">
                <input type="number" id="fog-height" value="3" min="1">
            </div>
            <button id="btn-generate-fog">Add Fog of War</button>
        </div>

        <div class="instructions">
            <ul>
                <li><strong>Drag</strong> tokens/fog to move them.</li>
                <li><strong>Right-Click</strong> an item to delete it.</li>
                <li><strong>Double-Click</strong> a token to edit HP.</li>
                <li><strong>Shift + Click</strong> a token to toggle "DM Only" visibility.</li>
            </ul>
        </div>
    </div>

    <div id="workspace">
        <div id="map-wrapper">
            <img id="map-image" src="" alt="" draggable="false">
            <div id="grid-overlay"></div>
            <div id="token-layer"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const workspace = document.getElementById('workspace');
        const mapWrapper = document.getElementById('map-wrapper');
        const mapUpload = document.getElementById('map-upload');
        const mapImage = document.getElementById('map-image');
        const gridOverlay = document.getElementById('grid-overlay');
        const gridToggle = document.getElementById('grid-toggle');
        const gridSizeInput = document.getElementById('grid-size');
        const gridOffsetXInput = document.getElementById('grid-offset-x');
        const gridOffsetYInput = document.getElementById('grid-offset-y');
        const tokenLayer = document.getElementById('token-layer');
        const btnGenerateToken = document.getElementById('btn-generate-token');
        const btnGenerateFog = document.getElementById('btn-generate-fog');
        
        // Projection Logic Elements
        const btnOpenPlayer = document.getElementById('btn-open-player');
        const playerStatus = document.getElementById('player-status');
        let playerWindow = null;

        let currentTokenZIndex = 100;
        let currentFogZIndex = 10000; 

        // Pan and Zoom Variables
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let startPanX = 0;
        let startPanY = 0;

        // ==========================================
        // PROJECTION SYNC LOGIC
        // ==========================================
        btnOpenPlayer.addEventListener('click', () => {
            if (playerWindow && !playerWindow.closed) {
                playerWindow.focus();
                return;
            }

            playerWindow = window.open('', 'PlayerProjection', 'width=1280,height=720');
            
            if (!playerWindow) {
                alert("Popup blocked! Please allow popups for this file to project the player screen.");
                return;
            }

            // JavaScript to inject into the player window for independent panning/zooming
            const playerScript = `
                let scale = 1;
                let panX = 0;
                let panY = 0;
                let isPanning = false;
                let startPanX = 0;
                let startPanY = 0;
                const workspace = document.getElementById('workspace');
                const mapWrapper = document.getElementById('map-wrapper');

                function updateTransform() {
                    mapWrapper.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')';
                }

                workspace.addEventListener('mousedown', (e) => {
                    isPanning = true;
                    startPanX = e.clientX - panX;
                    startPanY = e.clientY - panY;
                });

                window.addEventListener('mousemove', (e) => {
                    if (!isPanning) return;
                    panX = e.clientX - startPanX;
                    panY = e.clientY - startPanY;
                    updateTransform();
                });

                window.addEventListener('mouseup', () => { isPanning = false; });

                workspace.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const zoomSensitivity = 0.001;
                    const delta = -e.deltaY * zoomSensitivity;
                    const newScale = Math.min(Math.max(0.1, scale * Math.exp(delta)), 5);

                    const rect = workspace.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    panX = mouseX - (mouseX - panX) * (newScale / scale);
                    panY = mouseY - (mouseY - panY) * (newScale / scale);
                    
                    scale = newScale;
                    updateTransform();
                }, { passive: false });
            `;

            const styles = document.getElementById('main-styles').innerHTML;
            const playerHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Player Screen</title>
                    <style>
                        ${styles}
                        body { background-color: #11111b; }
                        #controls { display: none !important; }
                        #workspace { width: 100vw; height: 100vh; cursor: grab !important; }
                        #workspace:active { cursor: grabbing !important; }
                        
                        /* Hide DM elements from player projection */
                        .dm-only { display: none !important; } 
                        .hp-dm-only { display: none !important; }
                    </style>
                </head>
                <body>
                    <div id="workspace">
                        <div id="map-wrapper">
                            <img id="map-image" src="${mapImage.src}" style="${mapImage.style.cssText}" draggable="false">
                            <div id="grid-overlay" style="${gridOverlay.style.cssText}"></div>
                            <div id="token-layer">${tokenLayer.innerHTML}</div>
                        </div>
                    </div>
                    <script>${playerScript}<\/script>
                </body>
                </html>
            `;

            playerWindow.document.open();
            playerWindow.document.write(playerHTML);
            playerWindow.document.close();

            // Manually sync CSS variables to the child window so the grid renders correctly
            playerWindow.document.documentElement.style.setProperty(
                '--grid-size', 
                document.documentElement.style.getPropertyValue('--grid-size') || '50px'
            );

            playerStatus.textContent = "Live & Connected";
            playerStatus.style.color = "#a6e3a1";

            playerWindow.addEventListener('beforeunload', () => {
                playerStatus.textContent = "Not Connected";
                playerStatus.style.color = "#f38ba8";
                playerWindow = null;
            });
        });

        function syncToPlayer() {
            if (playerWindow && !playerWindow.closed) {
                const pDoc = playerWindow.document;
                
                // Keep CSS Grid Variable synced
                pDoc.documentElement.style.setProperty('--grid-size', document.documentElement.style.getPropertyValue('--grid-size') || '50px');

                // Sync Grid state (visible, offsets)
                const pGridOverlay = pDoc.getElementById('grid-overlay');
                if (pGridOverlay) pGridOverlay.style.cssText = gridOverlay.style.cssText;

                // Sync Tokens and Fog
                const pTokenLayer = pDoc.getElementById('token-layer');
                if (pTokenLayer) pTokenLayer.innerHTML = tokenLayer.innerHTML;
                
                // We no longer sync 'mapWrapper.style.transform' so the player view is independent
            }
        }


        // ==========================================
        // MAP & VIEWPORT (DM Side)
        // ==========================================
        mapUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mapImage.src = event.target.result;
                    scale = 1; panX = 0; panY = 0;
                    updateTransform();
                    
                    if (playerWindow && !playerWindow.closed) {
                        playerWindow.document.getElementById('map-image').src = event.target.result;
                    }
                }
                reader.readAsDataURL(file);
            }
        });

        function updateTransform() {
            mapWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            // Removed syncToPlayer() from here so DM panning doesn't force Player panning
        }

        workspace.addEventListener('mousedown', (e) => {
            if (e.target.closest('#controls') || e.target.closest('.board-element')) return;
            isPanning = true;
            startPanX = e.clientX - panX;
            startPanY = e.clientY - panY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            panX = e.clientX - startPanX;
            panY = e.clientY - startPanY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isPanning = false; });

        workspace.addEventListener('wheel', (e) => {
            if (e.target.closest('#controls')) return;
            e.preventDefault();

            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            const newScale = Math.min(Math.max(0.1, scale * Math.exp(delta)), 5);

            const rect = workspace.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            
            scale = newScale;
            updateTransform();
        }, { passive: false });

        // ==========================================
        // GRID
        // ==========================================
        gridToggle.addEventListener('change', function() {
            gridOverlay.style.display = this.checked ? 'block' : 'none';
            syncToPlayer();
        });

        gridSizeInput.addEventListener('input', function() {
            document.documentElement.style.setProperty('--grid-size', this.value + 'px');
            updateElementSizes();
            syncToPlayer();
        });

        function updateGridOffset() {
            const x = gridOffsetXInput.value || 0;
            const y = gridOffsetYInput.value || 0;
            gridOverlay.style.backgroundPosition = `${x}px ${y}px`;
            syncToPlayer();
        }

        gridOffsetXInput.addEventListener('input', updateGridOffset);
        gridOffsetYInput.addEventListener('input', updateGridOffset);

        // ==========================================
        // CREATION LOGIC
        // ==========================================
        btnGenerateToken.addEventListener('click', createToken);
        btnGenerateFog.addEventListener('click', createFog);

        function getCenterSpawnPos() {
            return {
                x: (workspace.clientWidth / 2 - panX) / scale,
                y: (workspace.clientHeight / 2 - panY) / scale
            };
        }

        function createToken() {
            const initial = document.getElementById('token-initial').value;
            const hp = document.getElementById('token-hp').value;
            const sizeMultiplier = document.getElementById('token-size').value;
            const color = document.getElementById('token-color').value;
            const isDmOnly = document.getElementById('token-dm-only').checked;
            const isHpDmOnly = document.getElementById('token-hp-dm-only').checked;

            const token = document.createElement('div');
            token.className = 'board-element token';
            if (isDmOnly) token.classList.add('dm-only');
            
            token.style.backgroundColor = color;
            token.dataset.type = 'token';
            token.dataset.sizeScale = sizeMultiplier;
            token.dataset.hp = hp; 
            
            const currentGridSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--grid-size') || 50);
            token.style.width = (currentGridSize * sizeMultiplier) + 'px';
            token.style.height = (currentGridSize * sizeMultiplier) + 'px';
            
            const pos = getCenterSpawnPos();
            token.style.left = pos.x + 'px';
            token.style.top = pos.y + 'px';
            token.style.zIndex = currentTokenZIndex++;

            const hpDisplay = hp == 0 ? 'none' : 'block';
            const hpClass = isHpDmOnly ? 'token-hp hp-dm-only' : 'token-hp';

            token.innerHTML = `
                <span class="token-initial">${initial}</span>
                <span class="${hpClass}" style="display: ${hpDisplay}">${hp} HP</span>
            `;

            makeDraggableAndInteractive(token);
            tokenLayer.appendChild(token);
            syncToPlayer();
        }

        function createFog() {
            const wSquares = document.getElementById('fog-width').value;
            const hSquares = document.getElementById('fog-height').value;

            const fog = document.createElement('div');
            fog.className = 'board-element fog-of-war';
            fog.style.backgroundColor = '#000000';
            fog.dataset.type = 'fog';
            fog.dataset.wSquares = wSquares;
            fog.dataset.hSquares = hSquares;

            const currentGridSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--grid-size') || 50);
            fog.style.width = (currentGridSize * wSquares) + 'px';
            fog.style.height = (currentGridSize * hSquares) + 'px';

            const pos = getCenterSpawnPos();
            fog.style.left = pos.x + 'px';
            fog.style.top = pos.y + 'px';
            fog.style.zIndex = currentFogZIndex++; 

            makeDraggableAndInteractive(fog);
            tokenLayer.appendChild(fog);
            syncToPlayer();
        }

        function updateElementSizes() {
            const currentGridSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--grid-size') || 50);
            
            document.querySelectorAll('.token').forEach(token => {
                const sizeScale = parseInt(token.dataset.sizeScale);
                token.style.width = (currentGridSize * sizeScale) + 'px';
                token.style.height = (currentGridSize * sizeScale) + 'px';
            });

            document.querySelectorAll('.fog-of-war').forEach(fog => {
                const wScale = parseInt(fog.dataset.wSquares);
                const hScale = parseInt(fog.dataset.hSquares);
                fog.style.width = (currentGridSize * wScale) + 'px';
                fog.style.height = (currentGridSize * hScale) + 'px';
            });
        }

        // ==========================================
        // INTERACTION (DRAG, DELETE, EDIT)
        // ==========================================
        function makeDraggableAndInteractive(element) {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            element.addEventListener('mousedown', dragStart);

            element.addEventListener('contextmenu', (e) => {
                e.preventDefault(); 
                element.remove();
                syncToPlayer();
            });

            if (element.dataset.type === 'token') {
                element.addEventListener('dblclick', (e) => {
                    e.stopPropagation(); 
                    let currentHp = element.dataset.hp;
                    let newHp = prompt("Enter new HP (0 to hide):", currentHp);
                    
                    if (newHp !== null && !isNaN(newHp) && newHp.trim() !== '') {
                        element.dataset.hp = newHp;
                        let hpSpan = element.querySelector('.token-hp');
                        hpSpan.textContent = `${newHp} HP`;
                        hpSpan.style.display = newHp == 0 ? 'none' : 'block';
                        syncToPlayer();
                    }
                });
            }

            function dragStart(e) {
                if (e.button !== 0) return; 
                e.stopPropagation(); 

                // Shift-click to toggle DM only status
                if (e.shiftKey) {
                    if (element.dataset.type === 'token') {
                        element.classList.toggle('dm-only');
                        syncToPlayer();
                    }
                    return; // Prevent drag initialization if we just toggled
                }

                isDragging = true;
                
                if (element.dataset.type === 'fog') {
                    element.style.zIndex = currentFogZIndex++;
                } else {
                    element.style.zIndex = currentTokenZIndex++;
                }
                
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = element.offsetLeft;
                initialTop = element.offsetTop;

                document.addEventListener('mousemove', drag);
                document.addEventListener('mouseup', dragEnd);
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();

                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;

                element.style.left = (initialLeft + dx) + 'px';
                element.style.top = (initialTop + dy) + 'px';
                
                syncToPlayer(); 
            }

            function dragEnd() {
                isDragging = false;
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('mouseup', dragEnd);
            }
        }
    </script>
</body>
</html>
